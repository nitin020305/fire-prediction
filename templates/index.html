<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Fire Risk Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fef9e7 0%, #f5e8c7 50%, #e8d5b7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .frame {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 4px solid #dc3545;
            box-shadow: 
                0 25px 50px rgba(220, 53, 69, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            padding: 30px;
            max-width: 700px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #dc3545, #ff4757, #dc3545);
            border-radius: 24px 24px 0 0;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 20px;
            position: relative;
            border-bottom: 3px solid #dc3545;
            padding-bottom: 25px;
        }

        .header h2 {
            color: #8b4513;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header .fire-icon {
            font-size: 48px;
            animation: pulse 2s infinite;
            filter: hue-rotate(20deg);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            position: relative;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #8b4513;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 3px solid #dc3545;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fffaf0;
            color: #5d4037;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #c82333;
            background: white;
            box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.2);
            transform: translateY(-1px);
        }

        input[type="text"]::placeholder {
            color: #dc3545;
            opacity: 0.7;
        }

        .submit-btn {
            width: 100%;
            grid-column: 1 / -1;
            padding: 16px;
            background: linear-gradient(135deg, #dc3545, #c82333, #dc3545);
            color: white;
            border: 3px solid #dc3545;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(220, 53, 69, 0.5);
            background: linear-gradient(135deg, #c82333, #dc3545, #c82333);
        }

        .results {
            grid-column: 1 / -1;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 20px;
            margin-top: 20px;
            border: 4px solid #dc3545;
        }

        .prediction-high { 
            background: linear-gradient(135deg, #dc3545, #c82333); 
            color: white; 
        }
        .prediction-medium { 
            background: linear-gradient(135deg, #fd7e14, #e67e22); 
            color: white; 
            border-color: #fd7e14;
        }
        .prediction-low { 
            background: linear-gradient(135deg, #28a745, #20c997); 
            color: white; 
            border-color: #28a745;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .frame {
                padding: 25px 20px;
                margin: 10px;
            }
            
            .header h2 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="frame">
        <div class="header">
            <h2>Forest Fire Risk</h2>
            <div class="fire-icon">🔥</div>
        </div>
        
        <form action="/predict" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label for="Temperature">🌡️ Temperature</label>
                    <input type="text" id="Temperature" name="Temperature" placeholder="25.6°C" required>
                </div>
                
                <div class="form-group">
                    <label for="RH">💧 Humidity</label>
                    <input type="text" id="RH" name="RH" placeholder="64%" required>
                </div>
                
                <div class="form-group">
                    <label for="Ws">💨 Wind Speed</label>
                    <input type="text" id="Ws" name="Ws" placeholder="3.2 km/h" required>
                </div>
                
                <div class="form-group">
                    <label for="Rain">🌧️ Rain</label>
                    <input type="text" id="Rain" name="Rain" placeholder="0.0 mm" required>
                </div>
                
                <div class="form-group">
                    <label for="FFMC">🔥 FFMC</label>
                    <input type="text" id="FFMC" name="FFMC" placeholder="86.2" required>
                </div>
                
                <div class="form-group">
                    <label for="DMC">🌲 DMC</label>
                    <input type="text" id="DMC" name="DMC" placeholder="23.1" required>
                </div>
                
                <div class="form-group">
                    <label for="ISI">⚡ ISI</label>
                    <input type="text" id="ISI" name="ISI" placeholder="9.8" required>
                </div>
                
                <div class="form-group full-width">
                    <label for="Region">📍 Region</label>
                    <input type="text" id="Region" name="Region" placeholder="0 or 1" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">🔍 Predict Risk Level</button>
        </form>

        {% if prediction_text %}
        <div class="results prediction-{{ risk_level|lower }}">
            <h3>{{ prediction_text }}</h3>
            <h3>{{ risk }}</h3>
        </div>
        {% endif %}
    </div>
</body>
</html>
